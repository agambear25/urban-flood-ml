<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FloodLens — urban flood risk</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,"Segoe UI",system-ui,sans-serif;color:#14202b;font-size:14px;height:100vh;display:flex;flex-direction:column;}
  header{display:flex;align-items:center;gap:12px;padding:9px 13px;border-bottom:1px solid #e0e6ea;flex-wrap:wrap;}
  .brand{font-weight:800;font-size:16px;}.brand .b2{color:#2e7d8c;}
  select#citySel{font-weight:600;border:1px solid #cdd8df;border-radius:8px;padding:5px 10px;background:#fff;font-size:14px;}
  .lenses{display:flex;gap:4px;margin-left:auto;}
  .lens{border:1px solid #cdd8df;background:#fff;border-radius:8px;padding:6px 11px;cursor:pointer;font-weight:600;font-size:12.5px;color:#3a4a56;}
  .lens.active{background:#14202b;color:#fff;border-color:#14202b;}
  .body{flex:1;display:flex;min-height:0;}
  #map{flex:1;}
  .side{width:360px;border-left:1px solid #e0e6ea;display:flex;flex-direction:column;min-height:0;}
  .panel{padding:13px 14px;overflow:auto;flex:1;}
  .ph{color:#6a7884;font-size:13px;}
  .band{display:inline-block;font-weight:800;font-size:11px;padding:2px 9px;border-radius:999px;color:#fff;}
  .b-severe{background:#c62828;}.b-high{background:#ef6c00;}.b-moderate{background:#f9a825;color:#3a2c00;}.b-low{background:#2e7d32;}
  .tier{font-size:11px;color:#6a7884;text-transform:capitalize;margin-left:6px;}
  .imagery{font-size:11.5px;color:#41525e;margin:9px 0;border:1px dashed #c3ced6;border-radius:7px;padding:6px 9px;background:#f7fafb;}
  h3{font-size:16px;margin-bottom:6px;}h4{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:#7a8893;margin:12px 0 5px;}
  ul.why{margin-left:16px;}ul.why li{margin:3px 0;}
  .score{font-size:11px;color:#8593a0;margin-top:8px;}
  .dl a{display:inline-block;border:1px solid #cdd8df;border-radius:8px;padding:6px 10px;margin:3px 4px 0 0;font-size:12px;font-weight:600;color:#1d3c5a;text-decoration:none;}
  .disc{border:1px solid #e3b3b3;background:#fdf3f3;color:#8c2f2f;border-radius:8px;padding:8px 10px;font-size:12px;font-weight:600;margin-top:10px;}
  .events{padding:8px 14px;border-top:1px solid #eef2f4;font-size:11.5px;color:#5b6b78;}
  .chip{display:inline-block;background:#eef3f5;border-radius:999px;padding:2px 8px;margin:2px 3px 0 0;font-weight:600;color:#37474f;}
  .mhead{display:flex;align-items:center;gap:8px;}
  .mplay{width:24px;height:24px;border-radius:50%;border:none;background:#14202b;color:#fff;cursor:pointer;font-size:11px;flex:none;}
  .mcap{margin-left:auto;font-weight:700;color:#1d3c5a;}
  .mrow{display:flex;align-items:flex-end;gap:8px;height:54px;margin:7px 0 2px;}
  .mcol{display:flex;flex-direction:column;align-items:center;cursor:pointer;}
  .mbar{width:20px;background:#9cc1d6;border-radius:3px 3px 0 0;transition:background .2s;}
  .mcol.on .mbar{background:#1565c0;}
  .myr{font-size:10px;color:#5b6b78;margin-top:2px;}
  .mcol.on .myr{font-weight:800;color:#14202b;}
  .mnote{font-size:10px;color:#90a0ab;}
  .caveats{padding:9px 14px;border-top:1px solid #eef2f4;font-size:11px;color:#6a7884;background:#fcfdfe;}
  .caveats summary{cursor:pointer;font-weight:700;color:#5b6b78;}
  .caveats li{margin:4px 0 4px 16px;}
  .legend{background:rgba(255,255,255,.94);padding:7px 9px;border-radius:8px;font-size:11px;line-height:1.5;box-shadow:0 1px 4px rgba(0,0,0,.15);}
  .legend b{display:block;margin-bottom:3px;}.sw{display:inline-block;width:13px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle;}
  .opacity{background:rgba(255,255,255,.94);padding:6px 9px;border-radius:8px;font-size:11px;box-shadow:0 1px 4px rgba(0,0,0,.15);}
</style>
</head>
<body>
<header>
  <div class="brand">Flood<span class="b2">Lens</span></div>
  <select id="citySel">
    <option value="delhi">Delhi</option>
    <option value="mumbai">Mumbai</option>
    <option value="bengaluru">Bengaluru</option>
    <option value="chandigarh">Chandigarh</option>
  </select>
  <div class="lenses">
    <div class="lens active" data-lens="address">🏠 Explore</div>
    <div class="lens" data-lens="route">🚗 Route</div>
    <div class="lens" data-lens="data">📊 Data</div>
  </div>
</header>
<div class="body">
  <div id="map"></div>
  <div class="side">
    <div class="panel" id="panel"><p class="ph">Loading…</p></div>
    <div class="events" id="events"></div>
    <details class="caveats" id="caveats"><summary>How to read this — and its limits</summary><ul></ul></details>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const BAND={severe:"b-severe",high:"b-high",moderate:"b-moderate",low:"b-low"};
const BAND_LEGEND=[["severe","#c62828"],["high","#ef6c00"],["moderate","#f9a825"],["low","#2e7d32"]];
let lens="address", clickedSpot=null, city="delhi";
let overlay=null, hotspotLayer=null, overlayOpacity=0.55;
let monsoonTimer=null, monsoonIdx=0, monsoonEvents=[];
let routeA=null, routeB=null, routeGroup=null, currentHotspots=[];
const SEVW={severe:3,high:2,moderate:1,low:0};

const map=L.map("map",{zoomControl:true});
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
  {attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:19,subdomains:"abcd"}).addTo(map);

// static legend + opacity controls (band scheme is identical across cities)
const lg=L.control({position:"bottomright"});
lg.onAdd=()=>{const d=L.DomUtil.create("div","legend");
  d.innerHTML="<b>Flood-proneness (relative)</b>"+BAND_LEGEND.map(([n,c])=>
    `<div><span class="sw" style="background:${c}"></span>${n}</div>`).join("")+
    '<div style="margin-top:4px"><span class="sw" style="background:#37474f;border-radius:50%"></span>reported hotspot</div>';
  return d;};
lg.addTo(map);
const oc=L.control({position:"topright"});
oc.onAdd=()=>{const d=L.DomUtil.create("div","opacity");
  d.innerHTML='risk overlay <input id="op" type="range" min="0" max="100" value="55" style="vertical-align:middle">';
  L.DomEvent.disableClickPropagation(d);
  setTimeout(()=>document.getElementById("op").addEventListener("input",e=>{
    overlayOpacity=e.target.value/100; if(overlay) overlay.setOpacity(overlayOpacity);}),0);
  return d;};
oc.addTo(map);
map.on("click", onMapClick);

const panel=document.getElementById("panel");
function esc(s){return (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

function showSpot(p){
  clickedSpot=p;
  if(lens!=="address"){renderLens();return;}
  panel.innerHTML=`<h3>${esc(p.name)}</h3>
    <span class="band ${BAND[p.band]||"b-low"}">${(p.band||"").toUpperCase()}</span>
    <span class="tier">${esc(p.tier||"")} hotspot</span>
    <div class="imagery">🛰️ ${esc(p.imagery)}</div>
    <h4>Why the model flags it</h4>
    <ul class="why">${(p.why||[]).map(w=>`<li>${esc(w)}</li>`).join("")||"<li>—</li>"}</ul>
    <div class="score">relative score ${p.relative_score} · a ranking within the city, not a probability</div>`;
}
function showEmpty(){
  clickedSpot=null;
  if(lens!=="address")return;
  panel.innerHTML=`<p class="ph"><b>No reported flood point here.</b><br>The map has no record at this spot — that means <b>"not on record", not "safe"</b>. Click a coloured marker to see why it floods.</p>`;
}
function renderLens(){
  document.querySelectorAll(".lens").forEach(t=>t.classList.toggle("active",t.dataset.lens===lens));
  if(lens==="address"){clickedSpot?showSpot(clickedSpot):showEmpty();}
  else if(lens==="route"){ routeInstructions(); } else {
    panel.innerHTML=`<h3>Data — ${esc(city)}</h3><p class="ph">The same data, downloadable:</p>
      <div class="dl"><a href="web/${city}/risk.png" download>risk overlay (PNG)</a>
      <a href="web/${city}/hotspots.geojson" download>hotspots (GeoJSON)</a>
      <a href="web/${city}/meta.json" download>meta (JSON)</a></div>
      <div class="disc">⚠ Relative screening signal — not an actuarial flood model. No return periods, depths, or loss curves.</div>`;
  }
}
document.querySelectorAll(".lens").forEach(t=>t.addEventListener("click",()=>{lens=t.dataset.lens;renderLens();}));
document.getElementById("citySel").addEventListener("change",e=>loadCity(e.target.value));

function onMapClick(e){ if(lens==="route"){ setRoutePoint(e.latlng); } else { showEmpty(); } }
function ensureRouteGroup(){ if(!routeGroup) routeGroup=L.layerGroup().addTo(map); return routeGroup; }
function clearRoute(){ routeA=null; routeB=null; if(routeGroup) routeGroup.clearLayers(); }
function routeInstructions(){
  panel.innerHTML=`<h3>Route</h3><p class="ph">Click your <b>start</b> on the map, then your <b>destination</b>. I'll draw the routes, flag the known flood spots you'd pass, and recommend the lower-risk one.</p>`;
}
function ptMarker(ll,color){ return L.circleMarker(ll,{radius:7,color:"#fff",weight:2,fillColor:color,fillOpacity:1}); }
function setRoutePoint(ll){
  ensureRouteGroup();
  if(!routeA || (routeA && routeB)){ clearRoute(); routeA=ll; routeGroup.addLayer(ptMarker(ll,"#1565c0"));
    if(lens==="route") panel.innerHTML=`<h3>Route</h3><p class="ph">Start set. Now click your <b>destination</b>.</p>`; }
  else { routeB=ll; routeGroup.addLayer(ptMarker(ll,"#6a1b9a")); computeRoute(); }
}
async function computeRoute(){
  if(lens==="route") panel.innerHTML=`<h3>Route</h3><p class="ph">Finding routes…</p>`;
  try{
    const u=`https://router.project-osrm.org/route/v1/driving/${routeA.lng},${routeA.lat};${routeB.lng},${routeB.lat}?overview=full&geometries=geojson&alternatives=true`;
    const data=await (await fetch(u)).json();
    if(!data.routes||!data.routes.length){ if(lens==="route") panel.innerHTML=`<h3>Route</h3><p class="ph">No driving route found between those points.</p>`; return; }
    routeGroup.clearLayers();
    routeGroup.addLayer(ptMarker(routeA,"#1565c0")); routeGroup.addLayer(ptMarker(routeB,"#6a1b9a"));
    const scored=data.routes.map(r=>{
      const latlngs=r.geometry.coordinates.map(c=>L.latLng(c[1],c[0]));
      const spots=onRouteSpots(latlngs);
      return {latlngs,spots,score:spots.reduce((a,s)=>a+SEVW[s.band||"low"],0),dist:r.distance,dur:r.duration};
    }).sort((a,b)=>a.score-b.score||a.dur-b.dur);
    scored.forEach((s,rank)=>routeGroup.addLayer(L.polyline(s.latlngs,{color:rank===0?"#2e7d32":"#9aa7b1",weight:rank===0?6:4,opacity:rank===0?0.95:0.55})));
    renderRouteResults(scored);
  }catch(err){ if(lens==="route") panel.innerHTML=`<h3>Route</h3><p class="ph">Routing service is unavailable right now (${esc(err.message)}). A production build would run its own routing engine.</p><p class="ph"><a href="#" onclick="clearRoute();routeInstructions();return false;">try again</a></p>`; }
}
function onRouteSpots(latlngs){
  const out=[];
  currentHotspots.forEach(f=>{
    const c=f.geometry.coordinates, hl=L.latLng(c[1],c[0]);
    let min=1e12; for(let k=0;k<latlngs.length;k+=2){ const d=hl.distanceTo(latlngs[k]); if(d<min) min=d; }
    if(min<450) out.push(f.properties);
  });
  return out.sort((a,b)=>SEVW[b.band]-SEVW[a.band]);
}
function renderRouteResults(scored){
  if(lens!=="route") return;
  const fmt=s=>`${(s.dist/1000).toFixed(1)} km · ${Math.round(s.dur/60)} min`;
  const opt=(s,rank)=>{
    const names=s.spots.slice(0,3).map(x=>(x.name||"").split(",")[0]).join(", ");
    const sub=s.spots.length?`passes ${s.spots.length} known flood spot${s.spots.length>1?"s":""}${names?": "+names:""}`:"no known flood spots on the way";
    return `<div style="border:1px solid ${rank===0?"#2e7d32":"#e6ecf0"};border-radius:9px;padding:9px 10px;margin-bottom:7px;${rank===0?"box-shadow:0 0 0 2px #2e7d3222;":""}">
      <b>${rank===0?"🛟 Lower-risk":"Alternative"}</b> — ${fmt(s)}<br>
      <span style="font-size:12px;color:#51606b">${esc(sub)}</span></div>`;
  };
  panel.innerHTML=`<h3>Route options</h3>${scored.map(opt).join("")}
    <p class="ph" style="margin-top:6px">"Lower-risk" = passes fewer / less-severe <b>known</b> flood points (within ~450 m of the route). Known points only — not every flood, and not live water. <a href="#" onclick="clearRoute();routeInstructions();return false;">clear</a></p>`;
}

function renderMonsoon(events){
  monsoonEvents=events; monsoonIdx=0;
  const scale=200;  // mm cap for bar height (absolute, so Mumbai reads taller than the others)
  const bars=events.map((e,i)=>{
    const mm=e.peak_day_mm||0, h=Math.max(4,Math.min(1,mm/scale)*46);
    return `<div class="mcol" data-i="${i}"><div class="mbar" style="height:${h}px"></div><div class="myr">${e.date.slice(0,4)}</div></div>`;
  }).join("");
  document.getElementById("events").innerHTML=
    `<div class="mhead"><button class="mplay" id="mplay">▶</button><b>Rain on recorded flood events</b><span class="mcap" id="mcap"></span></div>
     <div class="mrow">${bars}</div>
     <div class="mnote">peak single-day rain · satellite city-average (under-reads local cloudbursts)</div>`;
  document.getElementById("mplay").addEventListener("click",toggleMonsoon);
  document.querySelectorAll("#events .mcol").forEach(c=>c.addEventListener("click",()=>{stopMonsoon();showMonsoon(+c.dataset.i);}));
  showMonsoon(0);
}
function showMonsoon(i){
  monsoonIdx=i; const e=monsoonEvents[i]; if(!e)return;
  document.querySelectorAll("#events .mcol").forEach((c,j)=>c.classList.toggle("on",j===i));
  document.getElementById("mcap").textContent=`${e.date.slice(0,4)}: ~${e.peak_day_mm==null?"?":e.peak_day_mm} mm on the wettest day`;
}
function stopMonsoon(){if(monsoonTimer){clearInterval(monsoonTimer);monsoonTimer=null;}const b=document.getElementById("mplay");if(b)b.textContent="▶";}
function toggleMonsoon(){
  if(monsoonTimer){stopMonsoon();return;}
  const b=document.getElementById("mplay");if(b)b.textContent="⏸";
  monsoonTimer=setInterval(()=>showMonsoon((monsoonIdx+1)%monsoonEvents.length),1100);
}

async function loadCity(slug){
  city=slug; clickedSpot=null; stopMonsoon();
  panel.innerHTML='<p class="ph">Loading…</p>';
  if(overlay){map.removeLayer(overlay);overlay=null;}
  if(hotspotLayer){map.removeLayer(hotspotLayer);hotspotLayer=null;}
  try{
    const meta=await (await fetch(`web/${slug}/meta.json?v=`+Date.now())).json();
    const b=meta.bounds, bounds=[[b.south,b.west],[b.north,b.east]];
    map.setView([(b.south+b.north)/2,(b.west+b.east)/2],11);
    const fit=()=>{map.invalidateSize(true); if(map.getSize().y>60) map.fitBounds(bounds);};
    setTimeout(fit,250); window.addEventListener("load",()=>setTimeout(fit,120));
    const colors={}; meta.bands.forEach(x=>colors[x.name]=x.color);

    overlay=L.imageOverlay(`web/${slug}/risk.png?v=`+Date.now(),bounds,{opacity:overlayOpacity}).addTo(map);

    const hs=await (await fetch(`web/${slug}/hotspots.geojson?v=`+Date.now())).json();
    hotspotLayer=L.geoJSON(hs,{pointToLayer:(f,ll)=>L.circleMarker(ll,{radius:7,weight:2,color:"#fff",
        fillColor:colors[f.properties.band]||"#777",fillOpacity:0.95}),
      onEachFeature:(f,layer)=>layer.on("click",e=>{L.DomEvent.stopPropagation(e);showSpot(f.properties);})
    }).addTo(map);
    currentHotspots=hs.features; clearRoute();

    renderMonsoon(meta.events);
    document.querySelector("#caveats ul").innerHTML=meta.caveats.map(c=>`<li>${esc(c)}</li>`).join("");
    if(lens==="address") showEmpty(); else renderLens();
  }catch(err){panel.innerHTML=`<p class="ph">Couldn't load ${esc(slug)}: ${esc(err.message)}</p>`;}
}

loadCity("delhi");
</script>
</body>
</html>
